<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto SMS Automático</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
body{ background:#101827; color:#fff; }
.container{ width:420px; max-width:95%; margin:40px auto; }
.card{ background:#1f2937; padding:20px; border-radius:15px; margin-bottom:20px; }
h1{ text-align:center; margin-bottom:20px; }
button{ width:100%; border:none; padding:14px; border-radius:10px; cursor:pointer; color:white; font-size:15px; margin-top:10px; font-weight:bold; }
select { width: 100%; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 16px; background: #374151; color: white; border: none;}

.pix-btn{ background:#0ea5e9; }
.sms{ background:#d97706; }
.cancelar{ background:#dc2626; }

.info{ margin-top:15px; background:#111827; padding:12px; border-radius:10px; word-break:break-all; font-size: 18px; text-align: center; }
.label{ margin-top:12px; font-weight:bold; color: #9ca3af; font-size: 14px;}
.status-text{ text-align:center; margin-top:15px; font-weight: bold; font-size: 18px;}

textarea { width: 100%; padding: 10px; border-radius: 5px; background: #374151; color: white; border: none; resize: none; margin-top: 5px; }
.qr-container { text-align: center; margin-top: 15px; margin-bottom: 15px; }
.qr-container img { width: 200px; max-width: 100%; border-radius: 10px; border: 4px solid white; }

#tela-numero { display: none; }
</style>
</head>
<body>

<div class="container">
    <h1>Comprar Número</h1>

    <div class="card" id="tela-compra">
        <div class="label">Escolha o Serviço:</div>
        <select id="lista-servicos">
            <option value="">Carregando serviços...</option>
        </select>

        <button class="pix-btn" id="btn-comprar" onclick="gerarPix()">Gerar Pix para Comprar</button>
        
        <div id="pix-container" style="display: none;">
            <div class="label" style="text-align: center; margin-top: 20px;">Escaneie para pagar e aguarde:</div>
            <div class="qr-container">
                <img id="qr-code-img" src="" alt="QR Code">
            </div>
            
            <div class="label">Pix Copia e Cola:</div>
            <textarea id="copia-cola" rows="3" readonly></textarea>
            
            <div class="status-text" id="status-pagamento" style="color: #fbbf24;">Aguardando pagamento... Não feche a página!</div>
        </div>
    </div>

    <div class="card" id="tela-numero">
        <div class="status-text" style="color: #22c55e;">Pagamento Aprovado!</div>
        
        <div class="label">Seu Número:</div>
        <div class="info" id="numero" style="color: #4ade80; font-weight: bold; font-size: 24px;">-</div>

        <div class="label">Mensagem SMS:</div>
        <div class="info" id="sms">Aguardando SMS...</div>

        <button class="sms" onclick="novoSMS()">Solicitar Novo SMS (Se não chegar)</button>
        <button class="cancelar" onclick="cancelar()">Cancelar Número</button>
    </div>

</div>

<script>
// ATENÇÃO: Quando o seu Render terminar de instalar, troque o link abaixo 
// pelo link que o Render te der (ex: https://meu-projeto.onrender.com)
const API = "http://127.0.0.1:5000"; 

let pedidoAtual = "";
let activationId = "";
let verificadorPedido = null;
let verificadorSMS = null;

window.onload = async function() {
    // Carrega a lista de serviços do Python
    let r = await fetch(API + "/servicos");
    let servicos = await r.json();
    
    let select = document.getElementById("lista-servicos");
    select.innerHTML = "";
    
    for(let cod in servicos) {
        let op = document.createElement("option");
        op.value = cod;
        op.text = servicos[cod].nome + " - R$ " + servicos[cod].preco.toFixed(2);
        select.appendChild(op);
    }
};

async function gerarPix() {
    let servico = document.getElementById("lista-servicos").value;
    let btn = document.getElementById("btn-comprar");
    
    btn.innerHTML = "Gerando Pix...";
    btn.disabled = true;

    let r = await fetch(API + "/gerar_pagamento", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({servico: servico})
    });
    
    let j = await r.json();

    if(j.pedido_id) {
        pedidoAtual = j.pedido_id;
        document.getElementById("pix-container").style.display = "block";
        document.getElementById("copia-cola").value = j.copia_e_cola;
        document.getElementById("qr-code-img").src = "data:image/jpeg;base64," + j.qr_code_base64;
        btn.style.display = "none";
        
        // Começa a verificar de 3 em 3 segundos se o Pix foi pago
        verificadorPedido = setInterval(checarStatusPagamento, 3000);
    } else {
        alert("Erro: " + j.erro);
        btn.innerHTML = "Gerar Pix para Comprar";
        btn.disabled = false;
    }
}

async function checarStatusPagamento() {
    let r = await fetch(API + "/status_pedido/" + pedidoAtual);
    let j = await r.json();
    
    if(j.status === "entregue") {
        clearInterval(verificadorPedido); // Para de verificar o pagamento
        
        // Esconde a tela de compra e mostra a tela do número
        document.getElementById("tela-compra").style.display = "none";
        document.getElementById("tela-numero").style.display = "block";
        
        document.getElementById("numero").innerHTML = j.numero;
        activationId = j.activation_id;
        
        // Começa a procurar o SMS de 5 em 5 segundos
        verificadorSMS = setInterval(verSMS, 5000);
        
    } else if(j.status === "falha_estoque") {
        clearInterval(verificadorPedido);
        document.getElementById("status-pagamento").innerHTML = "Pagamento recebido, mas os números esgotaram! Contate o suporte.";
        document.getElementById("status-pagamento").style.color = "red";
    }
}

async function verSMS() {
    if(activationId === "") return;
    let r = await fetch(API + "/sms/" + activationId);
    let j = await r.json();

    document.getElementById("sms").innerHTML = j.resposta;

    if(j.resposta.startsWith("STATUS_OK")) {
        clearInterval(verificadorSMS);
    }
}

async function cancelar() {
    if(activationId === "") return;
    let r = await fetch(API + "/cancelar/" + activationId);
    let j = await r.json();
    alert("Comando de cancelamento enviado!");
    clearInterval(verificadorSMS);
}

async function novoSMS() {
    if(activationId === "") return;
    let r = await fetch(API + "/novosms/" + activationId);
    let j = await r.json();
    alert("Aguardando um novo SMS para o mesmo número...");
}
</script>

</body>
</html>
